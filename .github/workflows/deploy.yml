name: Deploy to GitHub Pages

on:
  push:
    branches: ['main'] # 当代码推送到 main 分支时自动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 对应你之前流水线里的 node 18
          
      - name: Install dependencies
        run: npm install # 自动下载依赖
        
      - name: Build
        run: npm run build # 自动打包生成 dist 文件夹
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 告诉 GitHub 把 dist 里的东西变成网页
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4